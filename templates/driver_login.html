<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbraGo - Driver Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A3BAA;
            --primary-light: #2F5BFF;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #1A2340;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1A3BAA 0%, #1A2340 100%);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 32px 0;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-control {
            font-family: inherit;
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            background-color: var(--bg);
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-light);
        }

        .btn-submit {
            font-family: inherit;
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(26, 59, 170, 0.3);
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }

        .alert {
            background-color: #FEF2F2;
            color: #DC2626;
            border: 1px solid #FCA5A5;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            list-style: none;
            margin-left: 0;
            padding-left: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>AbraGo</h1>
            <p>Driver Portal Authentication</p>
        </div>

        {% if messages %}
            <ul class="alert">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" name="username" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-submit">Access Dashboard</button>
        </form>
    </div>
</body>
</html>
